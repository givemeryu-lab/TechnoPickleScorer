<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  
<title>피클볼 트래커</title>
<style>
:root{--bg:#0b0d10;--panel:#15181c;--panel-raised:#1c2025;--line:#262b31;--court:#0d2b33;--court-line:#5fd0e8;--blue:#3b9eff;--blue-dim:#1f4a73;--text:#eef1f4;--text-dim:#8b9299;--text-faint:#5a6068;--gold:#e8b339;--win:#37c977;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;user-select:none;height:100%;}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;}

.header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--line);flex:none;}
.header .icon-btn{background:none;border:none;color:var(--text-dim);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:9px;flex:none;cursor:pointer;}
.header .icon-btn:active{background:var(--panel-raised);}
.icon-btn.voice-on{color:var(--blue)!important;background:var(--blue-dim)!important;}
.header .titles{flex:1;min-width:0;}
.header h1{font-size:19px;font-weight:700;margin:0;display:flex;align-items:center;gap:6px;}
.app-logo{height:22px;width:auto;max-width:32px;border-radius:6px;object-fit:contain;flex:none;}
.header .subtitle{font-size:12.5px;color:var(--text-dim);margin-top:1px;}
.header-actions{display:flex;gap:4px;}

.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.settings-overlay.open{opacity:1;pointer-events:all;}
.settings-drawer{position:fixed;top:0;left:0;bottom:0;width:min(340px,88vw);background:var(--panel);z-index:301;transform:translateX(-100%);transition:transform 0.28s cubic-bezier(0.32,0,0.12,1);display:flex;flex-direction:column;overflow:hidden;box-shadow:4px 0 32px rgba(0,0,0,0.5);}
.settings-drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--line);flex:none;}
.drawer-header h2{font-size:17px;font-weight:800;margin:0;}
.drawer-close{background:none;border:none;color:var(--text-dim);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.drawer-close:active{background:var(--panel-raised);}
.drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 32px;display:flex;flex-direction:column;gap:14px;}

.team-block{background:var(--panel-raised);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;}
.team-block.team-a{border-top:3px solid var(--blue);}
.team-block.team-b{border-top:3px solid var(--gold);}
.team-label{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.team-a .team-label{color:var(--blue);}
.team-b .team-label{color:var(--gold);}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
.player-input{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.player-input:last-child{margin-bottom:0;}
.player-input .pos-tag{width:22px;height:22px;border-radius:6px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-faint);font-weight:700;flex:none;}
.player-input input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--text);font-size:14px;font-family:inherit;min-width:0;user-select:text;}
.player-input input:focus{outline:none;border-color:var(--blue);}
.player-input input::placeholder{color:var(--text-faint);}
.player-input .picker-btn{width:34px;height:34px;border-radius:8px;flex:none;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.player-input .picker-btn:active{background:var(--blue-dim);color:#fff;border-color:var(--blue);}

.server-select-block{background:var(--panel-raised);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;}
.server-select-label{color:var(--text-dim);}
.server-select-label .dot{background:var(--text-dim);}
.server-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.server-choice{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:9px 8px;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.server-choice .sc-name{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.server-choice.active{background:var(--blue-dim);border-color:var(--blue);color:#fff;}

.game-settings-row{background:var(--panel-raised);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.gs-label{display:flex;flex-direction:column;gap:2px;}
.gs-label .t{font-size:13.5px;font-weight:600;}
.gs-label .d{font-size:11px;color:var(--text-dim);}
.stepper{display:flex;align-items:center;gap:9px;}
.stepper button{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:15px;cursor:pointer;}
.stepper button:active{background:var(--blue-dim);}
.stepper .val{font-size:15px;font-weight:700;min-width:16px;text-align:center;}
.win-by-toggle{display:flex;background:var(--panel);border-radius:8px;padding:3px;gap:2px;}
.win-by-toggle button{flex:1;border:none;background:none;color:var(--text-dim);padding:7px 4px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;}
.win-by-toggle button.active{background:var(--blue);color:#fff;}
.error-msg{font-size:12px;color:#ff6868;text-align:center;min-height:14px;}
.drawer-start-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.drawer-start-btn:active{background:#2f86dd;}

.game-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.score-table{padding:14px 16px 8px;}
.score-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:10px 0;gap:10px;}
.score-row+.score-row{border-top:1px solid var(--line);}
.team-names{display:flex;flex-direction:column;gap:3px;min-width:0;}
.pname{display:flex;align-items:center;gap:6px;overflow:hidden;}
.serve-r{font-size:13px;font-weight:800;color:var(--blue);border:2px solid var(--blue);border-radius:6px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex:none;}

.pname-btn{background:none;border:none;color:var(--text);font-size:19px;font-weight:700;font-family:inherit;cursor:pointer;padding:3px 7px;margin:-3px -7px;border-radius:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;text-align:left;display:inline-flex;align-items:center;gap:5px;transition:background 0.12s;}
.pname-btn:active{background:rgba(255,255,255,0.12);}
.pname-btn .edit-hint{font-size:12px;color:var(--text-faint);opacity:0.6;}
.slash-sep{color:var(--text-faint);font-size:14px;font-weight:400;flex:none;}

.game-scores{display:flex;gap:4px;}
.game-scores .gs{min-width:36px;text-align:center;font-size:29px;font-weight:800;color:var(--text-faint);font-variant-numeric:tabular-nums;}
.game-scores .gs.current{color:var(--text);}
.game-scores .gs.won{color:var(--win);}
.serve-indicator-row{text-align:center;font-size:12px;color:var(--text-faint);padding:1px 0 3px;}

.set-progress{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px 8px;}
.set-chip{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:11.5px;font-weight:700;color:var(--text-dim);}
.set-chip.set-a{border-color:var(--blue-dim);color:var(--blue);}
.set-chip.set-b{border-color:#6b5200;color:var(--gold);}
.set-chip.set-current{color:var(--text-faint);}

.court-wrap{margin:0 16px 12px;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
.court{display:grid;grid-template-columns:1fr 1fr;background:var(--court);position:relative;aspect-ratio:4/3;}
.court::before{content:'';position:absolute;left:50%;top:8%;bottom:8%;width:0;border-left:2px dashed rgba(95,208,232,0.35);}
.court::after{content:'';position:absolute;left:8%;right:8%;top:50%;height:0;border-top:2px solid rgba(95,208,232,0.55);}
.score-call-value{background:var(--panel);border:1.5px solid var(--blue);border-radius:7px;padding:2px 8px;font-size:13px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,0.3);margin-bottom:3px;}
.sc-sep{color:var(--text-faint);margin:0 3px;font-weight:400;}
.court-side{display:grid;grid-template-rows:1fr 1fr;position:relative;}
.court-quad{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 10px;position:relative;font-size:19px;font-weight:700;color:var(--text-dim);text-align:center;}
.court-quad.active{color:var(--text);}
.court-quad .qname{white-space:nowrap;background:none;border:none;color:inherit;font:inherit;font-size:17px;padding:3px 6px;margin:-3px -6px;border-radius:7px;cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
.court-quad .qname:active{background:rgba(255,255,255,0.12);}
.court-quad .serve-balls{position:absolute;display:flex;gap:3px;}
.court-quad:not(.side-right) .serve-balls{right:8px;top:8px;}
.court-quad.qtr-bottom:not(.side-right) .serve-balls{right:8px;bottom:8px;top:auto;}
.side-right .court-quad .serve-balls{left:8px;top:8px;}
.side-right .court-quad.qtr-bottom .serve-balls{left:8px;bottom:8px;top:auto;}
.ball-icon{width:13px;height:13px;color:var(--court-line);}
.court-quad.serving-now{background:radial-gradient(circle at center,rgba(95,208,232,0.16),transparent 70%);outline:2px solid var(--court-line);outline-offset:-2px;border-radius:9px;}
.swap-controls{position:absolute;left:0;right:0;top:50%;display:flex;align-items:center;justify-content:center;gap:12px;transform:translateY(-50%);z-index:5;}
.swap-btn{width:34px;height:34px;border-radius:50%;background:var(--panel);border:1.5px solid var(--court-line);color:var(--court-line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.swap-btn:active{background:var(--blue-dim);}
.swap-btn-main{width:38px;height:38px;background:var(--blue);border-color:var(--blue);color:#fff;}
.swap-btn-main:active{background:#2f86dd;}
.swap-btn-a{border-color:var(--blue);color:var(--blue);}
.swap-btn-a:active{background:var(--blue-dim);color:#fff;}
.swap-btn-b{border-color:var(--gold);color:var(--gold);}
.swap-btn-b:active{background:#352800;color:var(--gold);}

.tap-zones{flex:1;display:flex;align-items:center;justify-content:center;gap:16px;margin:0 16px;padding:4px 0;min-height:140px;}
.tap-zone{flex:1;max-width:190px;aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;cursor:pointer;gap:4px;box-shadow:0 8px 22px rgba(0,0,0,0.4);}
.tap-zone.zone-a{background:radial-gradient(circle at 32% 28%,#7fc4ff,var(--blue) 65%);color:#fff;}
.tap-zone.zone-b{background:radial-gradient(circle at 32% 28%,#ffe08a,var(--gold) 65%);color:#241a05;}
.tap-zone:active{filter:brightness(1.1);transform:scale(0.97);}
.tap-zone:disabled{filter:grayscale(0.5) brightness(0.7);}
.tap-zone.tap-zone-inactive{filter:grayscale(0.5) brightness(0.7);}
.tap-zone .zlabel{font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.tap-zone.zone-a .zlabel{color:rgba(255,255,255,0.88);}
.tap-zone.zone-b .zlabel{color:rgba(36,26,5,0.75);}
.tap-zone .zscore{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
.tap-zone .zhint{font-size:10.5px;}
.tap-zone.zone-a .zhint{color:rgba(255,255,255,0.7);}
.tap-zone.zone-b .zhint{color:rgba(36,26,5,0.6);}

/* ── Next Set Button ── */
.next-set-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--blue);color:#fff;
  border:none;border-radius:14px;
  padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(59,158,255,0.35);
  animation:pulse-glow 1.6s ease-in-out infinite;
}
.next-set-btn:active{background:#2f86dd;transform:scale(0.97);}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 4px 16px rgba(59,158,255,0.35);}
  50%{box-shadow:0 4px 26px rgba(59,158,255,0.65);}
}

.next-serve-pick{width:100%;max-width:340px;}
.nsp-label{font-size:11px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-bottom:8px;}
.nsp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.nsp-btn{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:11px 8px;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nsp-btn:active{filter:brightness(1.08);}

.controls-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px calc(12px + env(safe-area-inset-bottom));}
.ctrl-btn{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);padding:9px 13px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;}
.ctrl-btn:active{background:var(--panel-raised);}
.ctrl-btn svg{width:14px;height:14px;}

.score-toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--blue-dim);border:1.5px solid var(--blue);border-radius:12px;padding:7px 18px;font-size:19px;font-weight:800;color:var(--blue);letter-spacing:2px;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,0.5);z-index:300;pointer-events:none;animation:toastIn 0.18s ease,toastOut 0.3s ease 1.5s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) scale(0.85);}to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateX(-50%) scale(0.9);}}

/* Name Edit Sheet */
.name-edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:flex-end;justify-content:center;z-index:600;}
.name-edit-sheet{background:var(--panel);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px calc(28px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}
.ne-title{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ne-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.ne-badge-a{background:var(--blue-dim);color:var(--blue);}
.ne-badge-b{background:#352800;color:var(--gold);}
.ne-input-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
.ne-input{flex:1;background:var(--panel-raised);border:2px solid var(--blue);border-radius:12px;padding:13px 16px;color:var(--text);font-size:18px;font-weight:700;font-family:inherit;user-select:text;outline:none;min-width:0;}
.ne-input::placeholder{color:var(--text-faint);font-weight:400;font-size:15px;}
.ne-clear{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--panel-raised);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;font-size:17px;}
.ne-clear:active{background:#5a2020;color:#ff9b9b;}
.ne-roster-label{font-size:11px;color:var(--text-faint);font-weight:700;letter-spacing:0.3px;text-transform:uppercase;margin-bottom:8px;}
.ne-roster{display:flex;flex-direction:column;gap:6px;max-height:170px;overflow-y:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch;}
.ne-roster-item{display:flex;align-items:center;background:var(--panel-raised);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ne-roster-pick{flex:1;text-align:left;background:none;border:none;color:var(--text);font-size:14.5px;font-weight:600;padding:11px 14px;cursor:pointer;}
.ne-roster-pick:active{color:var(--blue);}
.ne-roster-del{width:40px;border:none;border-left:1px solid var(--line);background:none;color:var(--text-faint);font-size:14px;cursor:pointer;padding:0;align-self:stretch;}
.ne-roster-del:active{background:#5a2020;color:#ff9b9b;}
.ne-roster-empty{font-size:12.5px;color:var(--text-faint);padding:12px 0;text-align:center;}
.ne-actions{display:flex;gap:10px;}
.ne-actions button{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
.ne-confirm{background:var(--blue);color:#fff;}
.ne-confirm:active{background:#2f86dd;}
.ne-cancel-btn{background:var(--panel-raised);color:var(--text-dim);}
.ne-cancel-btn:active{background:var(--line);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.62);display:flex;align-items:flex-end;justify-content:center;z-index:400;}
.modal-card{background:var(--panel);border-radius:22px 22px 0 0;width:100%;max-width:480px;border-top:1px solid var(--line);max-height:92dvh;display:flex;flex-direction:column;overflow:hidden;}
.confirm-sheet{background:var(--panel-raised);border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-width:480px;width:100%;}
.confirm-sheet p{font-size:14px;color:var(--text-dim);margin:0 0 16px;text-align:center;}
.confirm-sheet .row{display:flex;gap:10px;}
.confirm-sheet button{flex:1;padding:13px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.confirm-sheet .danger{background:#5a2020;color:#ff9b9b;}
.confirm-sheet .cancel{background:var(--panel);color:var(--text-dim);}

.picker-sheet-inner{max-height:80vh;display:flex;flex-direction:column;padding:20px 18px calc(20px + env(safe-area-inset-bottom));text-align:left;}
.picker-title{font-size:16px;font-weight:800;margin:0 0 14px;text-align:center;}
.roster-add-row{display:flex;gap:8px;margin-bottom:12px;}
.roster-add-row input{flex:1;background:var(--panel-raised);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;min-width:0;user-select:text;}
.roster-add-row input:focus{outline:none;border-color:var(--blue);}
.roster-add-row input::placeholder{color:var(--text-faint);}
.roster-add-row button{flex:none;padding:0 14px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;}
.roster-add-row button:active{background:#2f86dd;}
.roster-list{overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:6px;-webkit-overflow-scrolling:touch;max-height:240px;}
.roster-empty{text-align:center;color:var(--text-faint);font-size:13px;padding:16px 0;}
.roster-item{display:flex;align-items:center;background:var(--panel-raised);border:1px solid var(--line);border-radius:10px;padding:4px 4px 4px 13px;}
.roster-name-btn{flex:1;text-align:left;background:none;border:none;color:var(--text);font-size:14.5px;font-weight:600;padding:9px 0;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.roster-name-btn:active{color:var(--blue);}
.roster-del-btn{flex:none;width:32px;height:32px;border-radius:7px;border:none;background:none;color:var(--text-faint);font-size:14px;cursor:pointer;}
.roster-del-btn:active{background:#5a2020;color:#ff9b9b;}
.picker-cancel{width:100%;padding:12px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:var(--panel-raised);color:var(--text-dim);margin-top:6px;}

/* ══ MATCH DETAIL MODAL ══ */

<div class="settings-drawer" id="settings-drawer"></div>
<script>
(function(){
"use strict";

/* WAKE LOCK */
let _wakeLock=null;
async function requestWakeLock(){if(!("wakeLock" in navigator))return;try{_wakeLock=await navigator.wakeLock.request("screen");updWake(true);_wakeLock.addEventListener("release",()=>{_wakeLock=null;updWake(false);});}catch(e){updWake(false);}}
function updWake(on){const b=document.getElementById("wakelock-badge");if(!b)return;b.textContent=on?"🔆 화면 켜짐 유지":"🔆 절전 방지 OFF";b.className="wakelock-badge"+(on?"":" off");}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&!_wakeLock)requestWakeLock();});
requestWakeLock();

/* VOICE */
const NW=["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty","twenty one"];
let _voiceEnabled=true,_voices=[];
function loadVoices(){_voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.addEventListener("voiceschanged",loadVoices);}
function pickVoice(){const p=["Samantha","Google US English","Alex","Karen"];for(const n of p){const f=_voices.find(v=>v.name===n);if(f)return f;}return _voices.find(v=>v.lang.startsWith("en-US"))||_voices.find(v=>v.lang.startsWith("en"))||_voices[0]||null;}
function speakScore(ss,rs,sn){if(!_voiceEnabled||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance((NW[ss]||ss)+"... "+(NW[rs]||rs)+"... "+(NW[sn]||sn));u.lang="en-US";u.rate=0.88;u.pitch=1.05;u.volume=1.0;const v=pickVoice();if(v)u.voice=v;if(speechSynthesis.paused)speechSynthesis.resume();speechSynthesis.speak(u);}
let _toastTimer=null;
function showScoreToast(ss,rs,sn){
  const old=document.getElementById("score-toast");if(old)old.remove();
  if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}
  const t=document.createElement("div");t.id="score-toast";t.className="score-toast";t.textContent=`${ss}-${rs}-${sn}`;document.body.appendChild(t);
  _toastTimer=setTimeout(()=>{const el=document.getElementById("score-toast");if(el)el.remove();_toastTimer=null;},2000);
}
function announceScore(g){if(!g)return;const ss=g.server==="a"?g.a:g.b,rs=g.server==="a"?g.b:g.a;const dispNum=g.firstServeOfGame?2:g.serverNum;showScoreToast(ss,rs,dispNum);speakScore(ss,rs,dispNum);}

/* FIREBASE */
const DEVICE_ID_KEY="pb_device_id_v1";
let state=null,_db=null,_unsubscribe=null;
const FC={apiKey:"AIzaSyA4GAT7ZK1ZKHArzx7kFSUp1MoLFeSGcQ0",authDomain:"dpad-dfc64.firebaseapp.com",projectId:"dpad-dfc64",storageBucket:"dpad-dfc64.firebasestorage.app",messagingSenderId:"1041083998516",appId:"1:1041083998516:web:9a4efea76381edefeac561"};
function initFirebase(){try{if(!firebase.apps.length)firebase.initializeApp(FC);_db=firebase.firestore();return true;}catch(e){return false;}}
function getDeviceId(){let id=localStorage.getItem(DEVICE_ID_KEY);if(!id){id="dev_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);localStorage.setItem(DEVICE_ID_KEY,id);}return id;}
const DEVICE_ID=getDeviceId();
function setSyncStatus(s){const b=document.getElementById("sync-badge");if(!b)return;const map={init:{icon:"⏳",text:"연결 중",cls:"sync-init"},syncing:{icon:"↑",text:"저장 중",cls:"sync-syncing"},ok:{icon:"✓",text:"동기화됨",cls:"sync-ok"},offline:{icon:"⚡",text:"오프라인",cls:"sync-offline"}};const m=map[s]||map.ok;b.className="sync-badge "+m.cls;b.textContent=m.icon+" "+m.text;}
function save(){if(!_db){setSyncStatus("offline");return;}setSyncStatus("syncing");_db.collection("sessions").doc(DEVICE_ID).set({data:JSON.stringify(state),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("offline"));}
async function loadFromFirestore(){if(!_db)return null;try{const d=await _db.collection("sessions").doc(DEVICE_ID).get();if(d.exists&&d.data().data)return JSON.parse(d.data().data);}catch(e){}return null;}
function subscribeRealtime(){if(!_db)return;if(_unsubscribe)_unsubscribe();_unsubscribe=_db.collection("sessions").doc(DEVICE_ID).onSnapshot({includeMetadataChanges:false},(doc)=>{if(!doc.exists||!doc.data()?.data||doc.metadata.hasPendingWrites)return;try{const r=JSON.parse(doc.data().data);Object.assign(state,r);render();setSyncStatus("ok");}catch(e){}},()=>setSyncStatus("offline"));}
async function bootstrap(){setSyncStatus("init");const fbOk=initFirebase();if(fbOk){const remote=await loadFromFirestore();state=remote||freshState();ensureState();setSyncStatus("ok");subscribeRealtime();}else{state=freshState();}render();}

/* MATCH HISTORY (DB) — 완료된 경기(시리즈)를 별도 컬렉션에 영구 저장 */
let _matchSaved=false;
let _nextServerNum=1;
async function saveMatchRecord(){
  if(!_db)return;
  try{
    const rec={
      deviceId:DEVICE_ID,
      players:{...state.players},
      pointsToWin:state.pointsToWin,
      winBy:state.winBy,
      winner:checkSeriesWin(),
      gamesA:gamesWon("a"),
      gamesB:gamesWon("b"),
      games:state.gamesArr.map(g=>({a:g.a,b:g.b,winner:g.winner,startingServer:g.startingServer,pointLog:(g.pointLog||[]).map(p=>({team:p.team,prevServerNum:p.prevServerNum,scored:p.scored!==false}))})),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    };
    await _db.collection("matches").add(rec);
  }catch(e){}
}

let _historyMatches=null,_historyLoading=false,_historyDetail=null,_histModalTab="details";
function openHistory(){_historyDetail=null;_histModalTab="details";_modal=()=>renderHistoryModal();render();loadHistory();}
async function loadHistory(){
  if(!_db){_historyMatches=[];render();return;}
  _historyLoading=true;render();
  try{
    const snap=await _db.collection("matches").orderBy("createdAt","desc").limit(50).get();
    _historyMatches=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){_historyMatches=[];}
  _historyLoading=false;
  if(_modal)render();
}
function closeHistory(){_modal=null;_historyDetail=null;render();}
async function deleteHistoryItem(id){
  if(!confirm("이 경기 기록을 삭제할까요?"))return;
  try{await _db.collection("matches").doc(id).delete();}catch(e){}
  _historyMatches=(_historyMatches||[]).filter(m=>m.id!==id);
  render();
}
function tnFrom(rec){const p=rec.players||{};return(team,num)=>{if(team==="a")return num===1?(p.a1||"Team A-1"):(p.a2||"Team A-2");return num===1?(p.b1||"Team B-1"):(p.b2||"Team B-2");};}
function ensureState(){if(!Array.isArray(state.roster))state.roster=[];if(!state.startingServerChoice)state.startingServerChoice={team:"a",num:1};if(!state.current&&state.screen==="game")state.current=newGame("a");state.seriesTarget=3;}
bootstrap();

/* GAME LOGIC */
const ST=3;
function tn(team,num){const p=state.players;if(team==="a")return num===1?(p.a1||"Team A-1"):(p.a2||"Team A-2");return num===1?(p.b1||"Team B-1"):(p.b2||"Team B-2");}
function freshState(){return{screen:"game",players:{a1:"",a2:"",b1:"",b2:""},winBy:2,pointsToWin:11,gamesArr:[],current:null,seriesTarget:ST,roster:[],startingServerChoice:{team:"a",num:1}};}
function newGame(sv,sp){return{a:0,b:0,server:sv,serverNum:sp||1,firstServeOfGame:true,posA:{right:1,left:2},posB:{right:1,left:2},teamSideSwapped:false,startingServer:sv,pointLog:[]};}
function gamesWon(t){return state.gamesArr.filter(g=>g.winner===t).length;}
function checkGameWin(g){const ptw=state.pointsToWin,wb=state.winBy;if(g.a>=ptw&&(wb===1||g.a-g.b>=wb))return"a";if(g.b>=ptw&&(wb===1||g.b-g.a>=wb))return"b";return null;}
function checkSeriesWin(){const h=Math.ceil(ST/2);if(gamesWon("a")>=h)return"a";if(gamesWon("b")>=h)return"b";return null;}
function isMatchOver(){return checkSeriesWin()!==null&&!state.current;}

/* FIX 2: "다음 세트" 버튼 조건
   - state.current===null : 현재 게임이 없음 (직전 게임이 방금 끝남)
   - state.gamesArr의 마지막 게임에 winner가 있음 : 한 경기가 정상 종료됨
   - !isMatchOver() : 아직 시리즈가 끝나지 않음
*/
function canStartNextSet(){
  if(state.current)return false;          // 경기 중이면 안 됨
  if(isMatchOver())return false;           // 시리즈 끝나면 안 됨
  const last=state.gamesArr[state.gamesArr.length-1];
  return !!(last&&last.winner);            // 마지막 경기가 종료된 경우만
}

function scorePoint(team){
  const g=state.current;if(!g)return;
  const isServerWin=(team===g.server);
  const log={team,prevA:g.a,prevB:g.b,prevServer:g.server,prevServerNum:g.serverNum,prevPosA:{...g.posA},prevPosB:{...g.posB},prevFirst:g.firstServeOfGame,scored:isServerWin};
  if(isServerWin){
    if(team==="a"){g.a++;const t=g.posA.right;g.posA.right=g.posA.left;g.posA.left=t;}else{g.b++;const t=g.posB.right;g.posB.right=g.posB.left;g.posB.left=t;}
  } else {
    /* 서브권 없는 팀이 랠리를 이기면 사이드 아웃(서브권만 이동), 득점은 없음 */
    if(g.firstServeOfGame){g.firstServeOfGame=false;g.server=team;g.serverNum=1;}
    else{
      if(g.server==="a"){if(g.serverNum===1)g.serverNum=2;else{g.server="b";g.serverNum=1;}}
      else{if(g.serverNum===1)g.serverNum=2;else{g.server="a";g.serverNum=1;}}
    }
  }
  g.pointLog.push(log);
  const w=checkGameWin(g);
  if(!w){announceScore(g);}
  else{if(_voiceEnabled&&window.speechSynthesis){speechSynthesis.cancel();const wn=w==="a"?(state.players.a1||"Team A"):(state.players.b1||"Team B");const u=new SpeechSynthesisUtterance("Game! "+wn+" wins!");u.lang="en-US";u.rate=0.9;u.pitch=1.1;const v=pickVoice();if(v)u.voice=v;speechSynthesis.speak(u);}g.winner=w;state.gamesArr.push(g);state.current=null;_nextServerNum=1;}
  save();
  if(isMatchOver()){if(!_matchSaved){_matchSaved=true;saveMatchRecord();}_matchModalTab="details";_modal=()=>renderMatchModal();render();}else{render();}
}

function undoPoint(){
  speechSynthesis.cancel();
  const g=state.current;
  if(g&&g.pointLog.length>0){const last=g.pointLog.pop();g.a=last.prevA;g.b=last.prevB;g.server=last.prevServer;g.serverNum=last.prevServerNum;g.posA={...last.prevPosA};g.posB={...last.prevPosB};g.firstServeOfGame=last.prevFirst;save();render();return;}
  if(!g&&state.gamesArr.length>0){const prev=state.gamesArr.pop();delete prev.winner;const last=prev.pointLog.pop();if(last){prev.a=last.prevA;prev.b=last.prevB;prev.server=last.prevServer;prev.serverNum=last.prevServerNum;prev.posA={...last.prevPosA};prev.posB={...last.prevPosB};prev.firstServeOfGame=last.prevFirst;}state.current=prev;save();render();}
}

/* NAME EDIT */
let _nameEdit=null;
function openNameEdit(field){_nameEdit={field};renderNameEdit();}
function closeNameEdit(){_nameEdit=null;document.getElementById("name-edit-root").innerHTML="";}

function renderNameEdit(){
  const root=document.getElementById("name-edit-root");
  if(!_nameEdit){root.innerHTML="";return;}
  const f=_nameEdit.field;
  const isA=f.startsWith("a");
  const numStr=f.endsWith("1")?"선수 1":"선수 2";
  const teamStr=isA?"팀 A":"팀 B";
  const cur=state.players[f]||"";
  const roster=state.roster;
  const rHtml=roster.length===0
    ?`<div class="ne-roster-empty">명단 없음 — 직접 입력하세요</div>`
    :roster.map(n=>`<div class="ne-roster-item"><button class="ne-roster-pick" data-n="${esc(n)}">${esc(n)}</button><button class="ne-roster-del" data-d="${esc(n)}">✕</button></div>`).join("");
  root.innerHTML=`<div class="name-edit-overlay" id="ne-bg">
    <div class="name-edit-sheet">
      <div class="ne-title"><span class="ne-badge ${isA?"ne-badge-a":"ne-badge-b"}">${teamStr} · ${numStr}</span>선수 이름 변경</div>
      <div class="ne-input-row">

/* SHARE */
function buildMatchShareText(gs,tnf,winnerTeam){
  const teamA=`${tnf("a",1)} / ${tnf("a",2)}`;
  const teamB=`${tnf("b",1)} / ${tnf("b",2)}`;
  const gA=gs.filter(g=>g.winner==="a").length,gB=gs.filter(g=>g.winner==="b").length;
  const winnerNames=winnerTeam==="a"?teamA:teamB;
  const lines=[`🏓 피클볼 경기 결과`,`${teamA}  vs  ${teamB}`,``,`🏆 ${winnerNames} 승 (${gA} : ${gB})`,``];
  gs.forEach((g,i)=>{lines.push(`세트 ${i+1}: ${g.a} - ${g.b}  (${g.winner==="a"?teamA:teamB} 승)`);});
  const tA=gs.reduce((s,g)=>s+g.a,0),tB=gs.reduce((s,g)=>s+g.b,0),tot=tA+tB||1;
  const mA=gs.length?Math.max(...gs.map(g=>g.a)):0,mB=gs.length?Math.max(...gs.map(g=>g.b)):0;
  lines.push(``,`📊 통계`);
  lines.push(`세트 승리: ${gA} - ${gB}`);
  lines.push(`총 득점: ${tA} - ${tB}`);
  lines.push(`득점률: ${Math.round(tA/tot*100)}% - ${Math.round(tB/tot*100)}%`);
  lines.push(`최고 세트 점수: ${mA} - ${mB}`);
  return lines.join("\n");
}
async function shareMatchText(text){
  if(navigator.share){
    try{await navigator.share({title:"피클볼 경기 결과",text});return;}catch(e){if(e&&e.name==="AbortError")return;}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    try{await navigator.clipboard.writeText(text);alert("경기 결과가 클립보드에 복사되었습니다.");return;}catch(e){}
  }
  window.prompt("아래 내용을 복사하세요:",text);
}
function shareCurrentMatch(){shareMatchText(buildMatchShareText(state.gamesArr,tn,checkSeriesWin()));}
function shareHistoryMatch(rec){if(!rec)return;shareMatchText(buildMatchShareText(rec.games||[],tnFrom(rec),rec.winner));}

      <div class="set-card-header">
        <span class="set-card-label">세트 ${i+1} &nbsp;·&nbsp; ${(g.pointLog||[]).filter(p=>p.scored!==false).length} 포인트</span>
        <span class="set-card-badge ${wa?"badge-a":"badge-b"}">${wa?"팀 A 승":"팀 B 승"}</span>
      </div>
      <div class="set-score-row"><span class="set-score-team team-a-text">${esc(tnf("a",1))} / ${esc(tnf("a",2))}</span><span class="set-score-num ${wa?"winner":"loser"}">${g.a}</span></div>
      <div class="set-score-row"><span class="set-score-team team-b-text">${esc(tnf("b",1))} / ${esc(tnf("b",2))}</span><span class="set-score-num ${!wa?"winner":"loser"}">${g.b}</span></div>
    </div>`;
  }).join("");
}

function renderStatsGeneric(gs,tnf){
  const tA=gs.reduce((s,g)=>s+g.a,0),tB=gs.reduce((s,g)=>s+g.b,0),tot=tA+tB||1;
  const wA=gs.filter(g=>g.winner==="a").length,wB=gs.filter(g=>g.winner==="b").length;
  const mA=gs.length?Math.max(...gs.map(g=>g.a)):0,mB=gs.length?Math.max(...gs.map(g=>g.b)):0;
  return`<div class="stat-section-title">전체 통계</div>
  <div class="stat-team-row"><span class="stat-team-a">${esc(tnf("a",1))} / ${esc(tnf("a",2))}</span><span class="stat-team-b">${esc(tnf("b",1))} / ${esc(tnf("b",2))}</span></div>
  ${sb("세트 승리",wA,wB,wA+wB)}${sb("총 득점",tA,tB,tA+tB)}${sb("득점률 (%)",Math.round(tA/tot*100),Math.round(tB/tot*100),100)}${sb("최고 세트 점수",mA,mB,Math.max(mA,mB)||1)}`;
}

function sb(label,a,b,tot){
  const t=tot||1,wa=Math.round(a/t*100),wb=Math.round(b/t*100);
  return`<div class="stat-block"><div class="stat-values"><span class="val-a">${a}</span><span class="stat-label">${label}</span><span class="val-b">${b}</span></div><div class="stat-bars"><div class="bar-track"><div class="bar-a" style="width:${wa}%"></div></div><div class="bar-track"><div class="bar-b" style="width:${wb}%"></div></div></div></div>`;
}

/* FIX 1: Breakdown — 세트별 독립 섹션으로 분리 */
function renderBreakdownGeneric(gs,tnf){
  if(!gs.length)return`<p style="color:var(--text-dim);text-align:center;padding:20px 0">기록 없음</p>`;
  return gs.map((g,gi)=>{
    let sA=0,sB=0;
    const winColor=g.winner==="a"?"score-a":"score-b";
    /* 각 세트 포인트 타임라인 — 세트별로 독립 블록 */
    const pts=(g.pointLog||[]).filter(p=>p.scored!==false);
    const rows=pts.map((p,idx)=>{
      if(p.team==="a")sA++;else sB++;
      const scorer=tnf(p.team,p.prevServerNum);
      return`<div class="bd-row${p.team==="a"?"":" bd-side-b"}">
        <div class="bd-bubble${p.team==="a"?"":" team-b"}">
          <div class="bd-badge">${idx+1}</div>
          ${p.team==="a"?sA:sB}
        </div>
        <div class="bd-name">${esc(scorer)}</div>
        <div style="flex:1"></div>
        <div class="bd-score-snap">${sA} : ${sB}</div>
      </div>`;
    });
    return`<div class="bd-set-section">
      <div class="bd-set-header">
        <span class="bd-set-title">세트 ${gi+1}</span>
        <span class="bd-set-score ${winColor}">${g.a} : ${g.b} &nbsp;<span style="font-size:10px;font-weight:700;opacity:0.8">${g.winner==="a"?"팀 A 승":"팀 B 승"}</span></span>
      </div>
      <div class="bd-timeline">
        ${rows.length>0?rows.join(""):`<div class="bd-empty">포인트 기록 없음</div>`}
      </div>
    </div>`;
  }).join("");
}

/* HISTORY (DB) MODALS */
function renderHistoryModal(){
  if(_historyDetail)return renderHistoryDetailModal(_historyDetail);
  let body;
  if(!_db){
    body=`<p class="hist-empty">DB에 연결되어 있지 않습니다.<br>오프라인 상태에서는 기록을 불러올 수 없습니다.</p>`;
  }else if(_historyLoading){
    body=`<p class="hist-empty">불러오는 중...</p>`;
  }else if(!(_historyMatches&&_historyMatches.length)){
    body=`<p class="hist-empty">저장된 경기 기록이 없습니다.<br>경기를 끝까지 마치면 자동으로 저장돼요.</p>`;
  }else{
    body=_historyMatches.map(m=>{
      const p=m.players||{};
      let dateStr="";
      try{if(m.createdAt&&m.createdAt.toDate){const dt=m.createdAt.toDate();dateStr=`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;}}catch(e){}
      const wa=m.winner==="a";
      return`<div class="hist-item" data-hid="${m.id}">
        <div class="hist-item-main">
          <div class="hist-item-teams">
            <span class="${wa?"hist-winner":""}">${esc(p.a1||"팀A-1")}/${esc(p.a2||"팀A-2")}</span>
            <span class="hist-vs">vs</span>
            <span class="${!wa?"hist-winner":""}">${esc(p.b1||"팀B-1")}/${esc(p.b2||"팀B-2")}</span>
          </div>
          <div class="hist-item-score">${m.gamesA??0} : ${m.gamesB??0}</div>
        </div>
        <div class="hist-item-sub">${dateStr||"날짜 정보 없음"}</div>
        <button class="hist-del-btn" data-hdel="${m.id}">✕</button>
      </div>`;
    }).join("");
  }
  return`<div class="match-modal-overlay" id="hmo">
    <div class="match-modal">
      <div class="match-banner" style="padding:18px 48px 14px;"><div class="match-winner-name" style="font-size:16px;">🗂️ 경기 기록</div><button class="match-close-x" id="hist-close-x">✕</button></div>
      <div class="match-body">${body}</div>
      <div class="match-footer"><button class="btn-secondary" id="btn-close-history">닫기</button></div>
    </div>
  </div>`;
}

function renderHistoryDetailModal(rec){
  const gs=rec.games||[];
  const gA=rec.gamesA??gs.filter(g=>g.winner==="a").length;
  const gB=rec.gamesB??gs.filter(g=>g.winner==="b").length;
  const tnf=tnFrom(rec);
  const wa=rec.winner==="a";
  const wt=wa?`${esc(tnf("a",1))} / ${esc(tnf("a",2))}`:`${esc(tnf("b",1))} / ${esc(tnf("b",2))}`;
  const wc=wa?"team-a-text":"team-b-text";
  let body=_histModalTab==="details"?renderDetailsGeneric(gs,tnf):_histModalTab==="stats"?renderStatsGeneric(gs,tnf):renderBreakdownGeneric(gs,tnf);
  return`<div class="match-modal-overlay" id="hdmo">
    <div class="match-modal">
      <div class="match-banner"><div class="match-trophy">🏆</div><div class="match-winner-name"><span class="${wc}">${wt}</span> 승리!</div><div class="match-winner-sub">세트 스코어 ${gA} : ${gB}</div><button class="match-close-x" id="hd-close-x">✕</button></div>
      <div class="match-tabs"><button class="match-tab${_histModalTab==="details"?" active":""}" data-hmt="details">상세</button><button class="match-tab${_histModalTab==="stats"?" active":""}" data-hmt="stats">통계</button><button class="match-tab${_histModalTab==="breakdown"?" active":""}" data-hmt="breakdown">타임라인</button></div>
      <div class="match-body">${body}</div>
      <div class="match-footer"><button class="btn-secondary" id="btn-share-hist">📤 경기결과 공유</button><button class="btn-secondary" id="btn-hist-back">← 목록으로</button></div>
    </div>
  </div>`;
}

/* CONFIRM / PICKER */
function renderConfirmReset(){return`<div class="modal-overlay" id="mob"><div class="confirm-sheet"><p>모든 기록이 초기화됩니다.</p><div class="row"><button class="danger" id="cy">초기화</button><button class="cancel" id="cc">취소</button></div></div></div>`;}
function renderPickerSheet(field){
  const r=state.roster;
  const lbs={a1:"팀 A · 선수 1",a2:"팀 A · 선수 2",b1:"팀 B · 선수 1",b2:"팀 B · 선수 2"};
  return`<div class="modal-overlay" id="mob"><div class="modal-card"><div class="picker-sheet-inner">
    <div class="picker-title">${lbs[field]||"선수 선택"}</div>
    <div class="roster-add-row"><input id="rai" placeholder="새 선수 추가"><button id="rab">추가</button></div>
    <div class="roster-list">${r.length===0?`<div class="roster-empty">명단이 비어있습니다</div>`:r.map(n=>`<div class="roster-item"><button class="roster-name-btn roster-pick-btn" data-field="${field}" data-name="${esc(n)}">${esc(n)}</button><button class="roster-del-btn" data-name="${esc(n)}">✕</button></div>`).join("")}</div>
    <button class="picker-cancel" id="pcb">취소</button>
  </div></div></div>`;
}

/* BIND */
function q(s){return document.querySelector(s);}
function qA(s){return Array.from(document.querySelectorAll(s));}
function on(s,ev,fn){const el=q(s);if(el)el.addEventListener(ev,fn);}

function bindEvents(){
  on("#btn-open-settings","click",()=>{_drawerOpen=true;render();});
  on("#btn-voice","click",()=>{_voiceEnabled=!_voiceEnabled;if(!_voiceEnabled)speechSynthesis.cancel();render();});
  on("#btn-reset","click",()=>{_modal=()=>renderConfirmReset();render();});
  on("#btn-match-detail","click",()=>{_matchModalTab="details";_modal=()=>renderMatchModal();render();});
  on("#btn-md2","click",()=>{_matchModalTab="details";_modal=()=>renderMatchModal();render();});
  on("#btn-history","click",openHistory);
  on("#btn-history-menu","click",()=>{_drawerOpen=false;openHistory();});
  on("#hist-close-x","click",closeHistory);
  on("#btn-close-history","click",closeHistory);
  on("#hd-close-x","click",()=>{_historyDetail=null;render();});
  on("#btn-hist-back","click",()=>{_historyDetail=null;render();});
  qA("[data-hmt]").forEach(tab=>tab.addEventListener("click",()=>{_histModalTab=tab.dataset.hmt;render();}));
  qA("[data-hid]").forEach(el=>el.addEventListener("click",e=>{if(e.target.closest("[data-hdel]"))return;const id=el.dataset.hid;const m=(_historyMatches||[]).find(x=>x.id===id);if(m){_historyDetail=m;_histModalTab="details";render();}}));
  qA("[data-hdel]").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();deleteHistoryItem(btn.dataset.hdel);}));
  on("#btn-score-a","click",()=>{if(!state.current){_drawerOpen=true;render();return;}scorePoint("a");});
  on("#btn-score-b","click",()=>{if(!state.current){_drawerOpen=true;render();return;}scorePoint("b");});
  on("#btn-undo","click",undoPoint);

  /* FIX 2: 다음 세트 버튼 — canStartNextSet() 이 true 일 때만 렌더됨 */
  on("#btn-nset","click",()=>{
    if(!canStartNextSet())return;
    const last=state.gamesArr[state.gamesArr.length-1];
    const ns=last?last.winner==="a"?"b":"a":"a";
    state.current=newGame(ns,_nextServerNum||1);
    _nextServerNum=1;
    save();render();
  });
  qA("[data-nsp]").forEach(btn=>btn.addEventListener("click",()=>{_nextServerNum=parseInt(btn.dataset.nsp);render();}));

  /* Name edit — score table */
  qA("[data-ef]").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();openNameEdit(btn.dataset.ef);}));
  /* Name edit — court quad */
  qA("[data-qet]").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();const t=btn.dataset.qet,n=parseInt(btn.dataset.qen);openNameEdit(t+(n===1?"1":"2"));}));

  /* Swap */

  /* Position controls bar (always-visible 3 buttons) */
  qA("[data-pos]").forEach(btn=>btn.addEventListener("click",()=>{
    const p=btn.dataset.pos;
    if(p==="teams"){if(state.current){state.current.teamSideSwapped=!state.current.teamSideSwapped;save();}render();}
    else if(p==="a"){const cg=ensurePre();if(cg){const t=cg.posA.right;cg.posA.right=cg.posA.left;cg.posA.left=t;save();}render();}
    else if(p==="b"){const cg=ensurePre();if(cg){const t=cg.posB.right;cg.posB.right=cg.posB.left;cg.posB.left=t;save();}render();}
  }));

  /* Drawer */
  on("#btn-dc","click",()=>{_drawerOpen=false;render();});
  document.getElementById("settings-overlay")?.addEventListener("click",()=>{_drawerOpen=false;render();});
  qA("input[data-field]").forEach(el=>el.addEventListener("input",e=>{state.players[e.target.dataset.field]=e.target.value;_setupErr="";}));
  qA("[data-pick]").forEach(btn=>btn.addEventListener("click",()=>{_pickerField=btn.dataset.pick;_modal=()=>renderPickerSheet(_pickerField);render();}));
  qA("[data-sct]").forEach(el=>el.addEventListener("click",()=>{state.startingServerChoice={team:el.dataset.sct,num:parseInt(el.dataset.scn)};render();}));
  qA("[data-step]").forEach(btn=>btn.addEventListener("click",()=>{const d=parseInt(btn.dataset.dir);if(btn.dataset.step==="ptw")state.pointsToWin=Math.max(7,Math.min(21,state.pointsToWin+d));render();}));
  qA("[data-wb]").forEach(btn=>btn.addEventListener("click",()=>{state.winBy=parseInt(btn.dataset.wb);render();}));
  on("#btn-start","click",startGame);

  /* Match modal */
  on("#match-close-x","click",closeMatchModal);
  on("#btn-close-match","click",closeMatchModal);
  on("#btn-share-match","click",shareCurrentMatch);
  on("#btn-share-hist","click",()=>shareHistoryMatch(_historyDetail));
  on("#btn-new-series","click",()=>{const{players,roster,pointsToWin,winBy}=state;state=freshState();Object.assign(state,{players,roster,pointsToWin,winBy});_modal=null;_matchSaved=false;save();render();});
  qA("[data-mt]").forEach(tab=>tab.addEventListener("click",()=>{_matchModalTab=tab.dataset.mt;render();}));

  /* Confirm */
  on("#mob","click",e=>{if(e.target.id==="mob")closeModal();});
  on("#cy","click",()=>{const{players,roster,pointsToWin,winBy}=state;state=freshState();Object.assign(state,{players,roster,pointsToWin,winBy});_modal=null;_matchSaved=false;save();render();});
  on("#cc","click",closeModal);

  /* Picker */
  on("#rab","click",()=>{const i=q("#rai");const n=(i?.value||"").trim();if(n&&!state.roster.includes(n)){state.roster.push(n);save();}render();});
  qA(".roster-del-btn").forEach(btn=>btn.addEventListener("click",()=>{state.roster=state.roster.filter(n=>n!==btn.dataset.name);save();render();}));
  qA(".roster-pick-btn").forEach(btn=>btn.addEventListener("click",()=>{if(btn.dataset.field)state.players[btn.dataset.field]=btn.dataset.name;closeModal();}));
  on("#pcb","click",closeModal);
}

function ensurePre(){if(!state.current){const sc=state.startingServerChoice;state.current=newGame(sc.team,sc.num);}return state.current;}
function closeModal(){_modal=null;render();}
function closeMatchModal(){_modal=null;render();}
function startGame(){const sc=state.startingServerChoice;state.current=newGame(sc.team,sc.num);state.gamesArr=[];_setupErr="";_drawerOpen=false;_matchSaved=false;save();render();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

})();
</script>
</body>
</html>
